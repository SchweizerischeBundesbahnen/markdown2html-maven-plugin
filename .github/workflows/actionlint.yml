---
name: ActionLint
on:
  # Run on push to main/master branch
  push:
    branches: [main]
  # Run on all pull requests
  pull_request:
    branches: ['**']
  # Allow manual triggering
  workflow_dispatch:
permissions:
  contents: read
jobs:
  actionlint:
    name: Check GitHub Actions Workflows
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@01d2dd67e3525e5a0ce72e8fa38e5a3ab65e2ded  # v1.72.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Report all findings as annotations directly on GitHub
          reporter: github-check
          # Error on warnings as well as errors
          fail_level: error
          # Comment on the pull request
          level: error
          filter_mode: nofilter
